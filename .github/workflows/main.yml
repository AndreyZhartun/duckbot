on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e   # stop on any error

            cd /home/ubuntu/duckbot

            git pull
            source venv/bin/activate
            pip install -r requirements.txt
            
            echo "--- Running DB init ---"

            PGPASSWORD="$PGPASSWORD" psql \
              -U botuser \
              -d duckdb \
              -h localhost \
              -f deployment/init.sql

            echo "--- Seeding database ---"
            OWNER_TELEGRAM_ID="${{ secrets.OWNER_TELEGRAM_ID }}" \
            SEED_ADMINS="${{ secrets.SEED_ADMINS }}" \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            python deployment/seed.py
            
            echo "DB seed complete."

            sudo systemctl restart duckbot
            sleep 3
            sudo systemctl is-active --quiet duckbot && echo "Bot is running." || echo "WARNING: bot failed to start."
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}